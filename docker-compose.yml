# Lake of Tears — Docker Compose
#
# Usage:
#   cp .env.example .env && $EDITOR .env
#   docker compose up -d
#
# Primary entry point:  http://localhost        (nginx shell — all services)
#
# Direct service ports (available for debugging):
#   Lake UI   → http://localhost:3000
#   MinIO API → http://localhost:9000  (S3 endpoint)
#   MinIO UI  → http://localhost:9001  (storage console)
#   Jupyter   → http://localhost:8888
#   Superset  → http://localhost:8088
#   Airflow   → http://localhost:8080
#
# Set DATALAKE_DATA_DIR in .env to your home directory (needed because
# docker compose may run as root and ${HOME} would resolve to /root).

networks:
  datalake:
    driver: bridge

volumes:
  superset_home:
  minio_data:
  postgres_data:

services:

  # ── Reverse proxy (single entry point) ──────────────────────────────────

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/lake.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - lake-ui
      - backend
      - jupyter
      - superset
      - airflow
    networks:
      - datalake

  # ── PostgreSQL (auth database) ──────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: lake_auth
      POSTGRES_USER: ${POSTGRES_AUTH_USER:-lake_auth}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_AUTH_USER:-lake_auth} -d lake_auth"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - datalake

  # ── Auth backend ────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_AUTH_USER:-lake_auth}:${POSTGRES_AUTH_PASSWORD}@postgres:5432/lake_auth
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      MICROSOFT_TENANT_ID: ${MICROSOFT_TENANT_ID:-common}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_AUTH_URL: ${OIDC_AUTH_URL:-}
      OIDC_TOKEN_URL: ${OIDC_TOKEN_URL:-}
      OIDC_USERINFO_URL: ${OIDC_USERINFO_URL:-}
      OIDC_SCOPE: ${OIDC_SCOPE:-openid email profile}
      OIDC_DISPLAY_NAME: ${OIDC_DISPLAY_NAME:-SSO}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - datalake

  # ── Object storage ──────────────────────────────────────────────────────

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - datalake

  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    container_name: minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
        mc mb --ignore-existing local/datalake &&
        echo 'datalake bucket ready.'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - datalake

  # ── Lake UI (shell) ─────────────────────────────────────────────────────

  lake-ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    container_name: lake-ui
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-${MINIO_ROOT_USER}}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-${MINIO_ROOT_PASSWORD}}
      MINIO_BUCKET: ${MINIO_BUCKET:-datalake}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      MINIO_CONSOLE_URL: ${MINIO_CONSOLE_URL:-http://localhost:9001}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      BACKEND_URL: http://backend:8000
    depends_on:
      minio:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - datalake

  # ── Analytics ───────────────────────────────────────────────────────────

  jupyter:
    image: jupyter/datascience-notebook:latest
    container_name: jupyter
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      JUPYTER_TOKEN: ${JUPYTER_TOKEN}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: datalake
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ${DATALAKE_DATA_DIR:-~}/notebooks:/home/jovyan/work
      - ${DATALAKE_DATA_DIR:-~}/datalake:/home/jovyan/datalake
    # base_url=/jupyter/ allows nginx to proxy at /jupyter/ path
    command: >
      bash -c "
        pip install duckdb requests boto3 google-genai --quiet &&
        pip install --force-reinstall 'anyio>=4.13' 'jupyter_server>=2.14' --quiet &&
        start-notebook.py --ServerApp.base_url='/jupyter/' --ServerApp.allow_origin='*'
      "
    networks:
      - datalake

  superset:
    image: apache/superset:latest
    container_name: superset
    restart: unless-stopped
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-please_change_me}
    volumes:
      - superset_home:/app/superset_home
      - ./deploy/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - datalake

  superset-init:
    image: apache/superset:latest
    container_name: superset-init
    restart: "no"
    depends_on:
      superset:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        superset db upgrade &&
        superset fab create-admin
          --username admin
          --firstname Admin
          --lastname User
          --email admin@localhost
          --password $${SUPERSET_ADMIN_PASSWORD} || true &&
        echo 'Superset initialized.'
      "
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-please_change_me}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD}
    volumes:
      - superset_home:/app/superset_home
      - ./deploy/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    networks:
      - datalake

  airflow:
    image: apache/airflow:2.10.3-python3.11
    container_name: airflow
    restart: unless-stopped
    ports:
      - "8080:8080"
    user: root
    entrypoint: >
      bash -c "
        python -m pip install --quiet duckdb requests boto3 google-genai scikit-learn 'numpy<2' &&
        exec /entrypoint standalone
      "
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-please_change_me}
      # base_url tells Airflow to generate links prefixed with /airflow/
      AIRFLOW__WEBSERVER__BASE_URL: http://localhost/airflow/
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: ${AIRFLOW_PASSWORD}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: datalake
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      SHOPIFY_STORE_DOMAIN: ${SHOPIFY_STORE_DOMAIN:-}
      SHOPIFY_ACCESS_TOKEN: ${SHOPIFY_ACCESS_TOKEN:-}
      HUBSPOT_ACCESS_TOKEN: ${HUBSPOT_ACCESS_TOKEN:-}
      POSTGRES_DSN: ${POSTGRES_DSN:-}
    volumes:
      - ${DATALAKE_DATA_DIR:-~}/airflow:/opt/airflow
      - ${DATALAKE_DATA_DIR:-~}/datalake:/opt/airflow/datalake
    networks:
      - datalake
