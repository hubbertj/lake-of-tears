<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Lake of Tears{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50:  '#eff6ff',
              400: '#60a5fa',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
            }
          }
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @layer base {
      html { @apply dark; }
      body { @apply bg-gray-900 text-gray-100 min-h-screen font-sans antialiased; }
    }
    @layer components {
      .card { @apply bg-gray-800 rounded-xl border border-gray-700 shadow-lg; }
      .btn-primary { @apply inline-flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-500 active:bg-blue-700 text-white font-medium rounded-lg transition-colors duration-150 cursor-pointer; }
      .nav-link { @apply flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium text-gray-400 hover:text-gray-100 hover:bg-gray-800 transition-colors duration-150; }
      .nav-link-active { @apply flex items-center gap-2 px-3 py-2 rounded-lg text-sm font-medium text-blue-400 bg-gray-800; }
      .input-dark { @apply w-full bg-gray-900 border border-gray-600 rounded-lg px-3 py-2 text-gray-100 placeholder-gray-500 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-colors; }
      .badge-green { @apply inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium bg-emerald-900/50 text-emerald-400 border border-emerald-800; }
      .badge-yellow { @apply inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-900/50 text-yellow-400 border border-yellow-800; }
      .badge-red { @apply inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium bg-red-900/50 text-red-400 border border-red-800; }
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <!-- Top nav -->
  <header class="sticky top-0 z-30 bg-gray-900/95 backdrop-blur border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-14">

        <!-- Logo -->
        <a href="/dashboard" class="flex items-center gap-2 shrink-0">
          <span class="text-2xl leading-none select-none">💧</span>
          <span class="text-lg font-bold tracking-tight text-gray-100">Lake of Tears</span>
        </a>

        <!-- Desktop nav -->
        <nav class="hidden sm:flex items-center gap-1">
          <a href="/dashboard"
             class="{% if page == 'dashboard' %}nav-link-active{% else %}nav-link{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
            </svg>
            Dashboard
          </a>
          <a href="/browse"
             class="{% if page == 'browse' %}nav-link-active{% else %}nav-link{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M3 7a2 2 0 012-2h14a2 2 0 012 2v1H3V7zm0 4h18M3 15h18M3 19h18"/>
            </svg>
            Browse
          </a>
          <a href="/query"
             class="{% if page == 'query' %}nav-link-active{% else %}nav-link{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"/>
            </svg>
            SQL Query
          </a>
          <a href="/ai"
             class="{% if page == 'ai' %}nav-link-active{% else %}nav-link{% endif %}">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="1.75" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"/>
            </svg>
            AI Query
          </a>
        </nav>

        <!-- Mobile hamburger (purely decorative here — full JS omitted for simplicity) -->
        <div class="sm:hidden text-gray-400">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </div>

      </div>
    </div>
  </header>

  <!-- Page content -->
  <main class="flex-1 max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Footer -->
  <footer class="border-t border-gray-800 mt-auto py-4 text-center text-xs text-gray-600">
    Lake of Tears &mdash; home lab datalakehouse &middot; MinIO + DuckDB + Gemini
  </footer>

</body>
</html>
