name: Bug Report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Before filing, please check the [existing issues](https://github.com/hubbertj/lake-of-tears/issues) and the [docs at lakeoftears.ai](https://lakeoftears.ai).

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the stack is affected?
      options:
        - Lake UI (FastAPI dashboard)
        - Pipeline — ingest
        - Pipeline — embed / summarize / anomaly detect
        - Pipeline — RAG query
        - Docker Compose deployment
        - Helm / Kubernetes deployment
        - Terraform
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Start the stack with `docker compose up -d`
        2. Open http://localhost:3000/query
        3. Run query: ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        OS: macOS 14 / Ubuntu 22.04
        Docker version: 26.x
        Deployment: Docker Compose / Helm
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste relevant output from `docker compose logs`
      render: shell
