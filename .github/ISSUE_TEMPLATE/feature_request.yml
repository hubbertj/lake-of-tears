name: Feature Request
description: Suggest a new feature or improvement
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea? We'd love to hear it. Check the [existing issues](https://github.com/hubbertj/lake-of-tears/issues) first to avoid duplicates.

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New data source connector
        - Lake UI
        - Pipeline (embed / anomaly / RAG)
        - Deployment (Docker Compose / Helm / Terraform)
        - Developer experience
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like this to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about?
