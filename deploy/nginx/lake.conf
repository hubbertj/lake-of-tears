# Lake of Tears — nginx reverse proxy
# Single entry point: http://localhost (port 80)
#
# Routes:
#   /            → Lake UI shell (port 3000)
#   /jupyter/    → JupyterLab  (port 8888, base_url=/jupyter/)
#   /superset/   → Superset    (port 8088, APPLICATION_PREFIX_PATH=/superset)
#   /airflow/    → Airflow     (port 8080, base_url=http://localhost/airflow/)

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 512M;

    # ── Lake UI shell ────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://lake-ui:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── JupyterLab ───────────────────────────────────────────────────────────
    # Jupyter is configured with base_url=/jupyter/ so it serves at that path.
    location /jupyter/ {
        proxy_pass         http://jupyter:8888/jupyter/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 86400;
        proxy_hide_header  X-Frame-Options;
        add_header         X-Frame-Options "SAMEORIGIN";
    }

    # ── Apache Superset ──────────────────────────────────────────────────────
    # Superset configured with APPLICATION_PREFIX_PATH=/superset.
    location /superset/ {
        proxy_pass         http://superset:8088/superset/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 300;
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  Content-Security-Policy;
        add_header         X-Frame-Options "SAMEORIGIN";
    }

    # ── Apache Airflow ───────────────────────────────────────────────────────
    # Airflow base_url=http://localhost/airflow/ generates links with /airflow/ prefix.
    # nginx strips the prefix before proxying to the Airflow container.
    location /airflow/ {
        proxy_pass         http://airflow:8080/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 300;
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  Content-Security-Policy;
        add_header         X-Frame-Options "SAMEORIGIN";
    }
}
