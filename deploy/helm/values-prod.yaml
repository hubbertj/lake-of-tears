# deploy/helm/values-prod.yaml
# Production overrides for a single-VM k3s deployment at 10.0.0.60.
#
# Secrets are NOT here — they live in /etc/lake-of-tears/values-secret.yaml on the VM.
# The Jenkinsfile passes both files to helm with two --values flags.
#
# Domains use nip.io (resolves <name>.<ip>.nip.io → <ip>) — no DNS config needed.

global:
  storageClass: local-path   # k3s built-in local-path provisioner

ingress:
  enabled: true
  className: nginx
  host: lake.10.0.0.60.nip.io
  minioConsoleHost: minio.10.0.0.60.nip.io
  minioApiHost: s3.10.0.0.60.nip.io

lakeui:
  minioConsoleUrl: "http://minio.10.0.0.60.nip.io"
  image:
    # repository and tag are set by the Jenkinsfile (--set) per build
    pullPolicy: Never   # image is imported directly into k3s containerd

minio:
  persistence:
    size: 50Gi
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"

jupyter:
  persistence:
    size: 10Gi
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"

superset:
  persistence:
    size: 2Gi
  resources:
    requests:
      cpu: "100m"
      memory: "512Mi"

airflow:
  persistence:
    size: 5Gi
  resources:
    requests:
      cpu: "200m"
      memory: "1Gi"

lakeui:
  resources:
    requests:
      cpu: "50m"
      memory: "256Mi"

backend:
  resources:
    requests:
      cpu: "50m"
      memory: "256Mi"

postgres:
  resources:
    requests:
      cpu: "50m"
      memory: "256Mi"
