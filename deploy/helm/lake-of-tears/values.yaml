# =============================================================================
# Lake of Tears — Helm Chart Values
# =============================================================================
# Copy this file and override values as needed:
#
#   helm install lake-of-tears ./deploy/helm/lake-of-tears \
#     --set minio.rootPassword=changeme \
#     --set gemini.apiKey=your-key \
#     -f my-values.yaml
#
# All passwords and API keys should be supplied at install time via --set or
# a local values override file. Do NOT commit secrets into version control.
# =============================================================================

# ---------------------------------------------------------------------------
# Global
# ---------------------------------------------------------------------------
global:
  # StorageClass used for all PersistentVolumeClaims.
  # Leave empty to use the cluster default StorageClass.
  # For NFS-backed storage (e.g. TrueNAS), set to your NFS StorageClass name.
  storageClass: ""

# ---------------------------------------------------------------------------
# MinIO CE — S3-compatible object storage
# ---------------------------------------------------------------------------
minio:
  image:
    repository: quay.io/minio/minio
    tag: RELEASE.2024-11-07T00-52-20Z
    pullPolicy: IfNotPresent

  # Root credentials — REQUIRED, no defaults
  rootUser: ""
  rootPassword: ""

  # Buckets to create on first startup (via minio-init job)
  buckets:
    - name: datalake

  persistence:
    size: 200Gi
    accessMode: ReadWriteOnce

  service:
    apiPort: 9000
    consolePort: 9001

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

# ---------------------------------------------------------------------------
# Lake UI — FastAPI + Tailwind unified shell
# ---------------------------------------------------------------------------
lakeui:
  image:
    repository: lake-of-tears-ui
    tag: latest
    pullPolicy: IfNotPresent

  # URL users can reach the MinIO console — set to your ingress minioConsoleHost
  # e.g. https://minio.example.com   (Kubernetes)
  #      http://localhost:9001        (local Docker Compose)
  minioConsoleUrl: ""

  service:
    port: 3000

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

# ---------------------------------------------------------------------------
# JupyterLab — interactive data exploration
# ---------------------------------------------------------------------------
jupyter:
  image:
    repository: jupyter/datascience-notebook
    tag: latest
    pullPolicy: IfNotPresent

  # Access token for JupyterLab — REQUIRED
  token: ""

  service:
    port: 8888

  persistence:
    size: 10Gi

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "4Gi"

# ---------------------------------------------------------------------------
# Apache Superset — dashboards and BI
# ---------------------------------------------------------------------------
superset:
  image:
    repository: apache/superset
    tag: "4.0.2"
    pullPolicy: IfNotPresent

  # Flask secret key — REQUIRED
  secretKey: ""

  # Admin account password — REQUIRED
  adminPassword: ""

  service:
    port: 8088

  persistence:
    size: 1Gi

  resources:
    requests:
      cpu: "250m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "2Gi"

# ---------------------------------------------------------------------------
# Apache Airflow — pipeline orchestration
# ---------------------------------------------------------------------------
airflow:
  image:
    repository: apache/airflow
    tag: 2.10.3-python3.11
    pullPolicy: IfNotPresent

  # Flask secret key — REQUIRED
  secretKey: ""

  # Admin account password — REQUIRED
  adminPassword: ""

  service:
    port: 8080

  persistence:
    size: 2Gi

  # Additional pip packages installed at container startup via _PIP_ADDITIONAL_REQUIREMENTS
  extraPipPackages:
    - duckdb
    - boto3
    - pyarrow
    - google-genai
    - scikit-learn
    - "numpy<2"

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

# ---------------------------------------------------------------------------
# Data source credentials (all optional — omit sources you don't use)
# ---------------------------------------------------------------------------
stripe:
  secretKey: ""

shopify:
  storeDomain: ""
  accessToken: ""

hubspot:
  accessToken: ""

postgres:
  dsn: ""

# ---------------------------------------------------------------------------
# Google Gemini AI
# ---------------------------------------------------------------------------
gemini:
  # Google AI Studio API key — REQUIRED for embeddings and RAG
  apiKey: ""

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx

  # Primary hostname — serves Lake UI, Notebooks (/jupyter/), Pipelines (/airflow/),
  # Dashboards (/superset/)
  host: lake.example.com

  # MinIO console is exposed on its own subdomain.
  # Path-based proxying of the MinIO console SPA is unreliable; set lakeui.minioConsoleUrl
  # to this value so the Storage page links users to the right URL.
  minioConsoleHost: minio.example.com

  # MinIO S3 API hostname (for external S3 clients and tools like DBeaver)
  minioApiHost: minio-api.example.com

  # Additional annotations merged onto every Ingress resource
  annotations: {}

  # TLS — list of { secretName, hosts } objects
  tls: []
  # Example:
  #   - secretName: lake-of-tears-tls
  #     hosts:
  #       - lake.example.com
  #       - minio.example.com
  #       - minio-api.example.com
