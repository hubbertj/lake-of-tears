apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lake-of-tears.fullname" . }}-credentials
  labels:
    {{- include "lake-of-tears.labels" . | nindent 4 }}
type: Opaque
stringData:
  MINIO_ROOT_USER: {{ .Values.minio.rootUser | quote }}
  MINIO_ROOT_PASSWORD: {{ required "minio.rootPassword is required" .Values.minio.rootPassword | quote }}
  JUPYTER_TOKEN: {{ required "jupyter.token is required" .Values.jupyter.token | quote }}
  SUPERSET_SECRET_KEY: {{ required "superset.secretKey is required" .Values.superset.secretKey | quote }}
  SUPERSET_ADMIN_PASSWORD: {{ required "superset.adminPassword is required" .Values.superset.adminPassword | quote }}
  AIRFLOW_SECRET_KEY: {{ required "airflow.secretKey is required" .Values.airflow.secretKey | quote }}
  AIRFLOW_ADMIN_PASSWORD: {{ required "airflow.adminPassword is required" .Values.airflow.adminPassword | quote }}
  TRUENAS_API_KEY: {{ .Values.truenas.apiKey | quote }}
  JELLYFIN_API_KEY: {{ .Values.jellyfin.apiKey | quote }}
  GEMINI_API_KEY: {{ .Values.gemini.apiKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: lakeui-secret
  labels:
    {{- include "lake-of-tears.labels" . | nindent 4 }}
type: Opaque
stringData:
  MINIO_ENDPOINT: {{ printf "%s-minio:9000" (include "lake-of-tears.fullname" .) | quote }}
  MINIO_ACCESS_KEY: {{ .Values.minio.rootUser | quote }}
  MINIO_SECRET_KEY: {{ required "minio.rootPassword is required" .Values.minio.rootPassword | quote }}
  GEMINI_API_KEY: {{ .Values.gemini.apiKey | quote }}
