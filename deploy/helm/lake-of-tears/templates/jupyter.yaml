---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lake-of-tears.fullname" . }}-jupyter
  labels:
    {{- include "lake-of-tears.labels" . | nindent 4 }}
    app.kubernetes.io/component: jupyter
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "lake-of-tears.name" . }}
      app.kubernetes.io/component: jupyter
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "lake-of-tears.name" . }}
        app.kubernetes.io/component: jupyter
    spec:
      containers:
        - name: jupyter
          image: {{ .Values.jupyter.image.repository }}:{{ .Values.jupyter.image.tag }}
          imagePullPolicy: {{ .Values.jupyter.image.pullPolicy }}
          command:
            - bash
            - -c
            - |
              pip install duckdb requests boto3 google-genai --quiet &&
              pip install --force-reinstall 'anyio>=4.13' 'jupyter_server>=2.14' --quiet &&
              start-notebook.py \
                --ServerApp.base_url='/jupyter/' \
                --ServerApp.allow_origin='*'
          env:
            - name: JUPYTER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: JUPYTER_TOKEN
            - name: MINIO_ENDPOINT
              value: "{{ include "lake-of-tears.fullname" . }}-minio:{{ .Values.minio.service.apiPort }}"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: GEMINI_API_KEY
          ports:
            - name: http
              containerPort: {{ .Values.jupyter.service.port }}
          resources:
            {{- toYaml .Values.jupyter.resources | nindent 12 }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lake-of-tears.fullname" . }}-jupyter
  labels:
    {{- include "lake-of-tears.labels" . | nindent 4 }}
    app.kubernetes.io/component: jupyter
spec:
  selector:
    app.kubernetes.io/name: {{ include "lake-of-tears.name" . }}
    app.kubernetes.io/component: jupyter
  ports:
    - name: http
      port: {{ .Values.jupyter.service.port }}
      targetPort: http
