---
# ConfigMap holding the Superset Python config.
# Mounted at /app/pythonpath/superset_config.py inside the container.
# Superset is served at its own subdomain (ingress.supersetHost), so no path prefix
# is needed. WTF_CSRF_ENABLED=False + TALISMAN_ENABLED=False allow iframe embedding.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "lake-of-tears.fullname" . }}-superset-config
  labels:
    {{- include "lake-of-tears.labels" . | nindent 4 }}
    app.kubernetes.io/component: superset
data:
  superset_config.py: |
    # Allow Superset to be embedded in an iframe from any origin.
    # Lake UI handles auth — users are already authenticated before reaching the iframe.
    SESSION_COOKIE_SAMESITE = "None"
    SESSION_COOKIE_SECURE = False
    WTF_CSRF_ENABLED = False
    TALISMAN_ENABLED = False
    TALISMAN_CONFIG = {"force_https": False, "frame_options": "ALLOWALL"}
