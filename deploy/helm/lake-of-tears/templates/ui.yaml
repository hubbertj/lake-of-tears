---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lake-of-tears.fullname" . }}-lakeui
  labels:
    {{- include "lake-of-tears.labels" . | nindent 4 }}
    app.kubernetes.io/component: lakeui
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "lake-of-tears.name" . }}
      app.kubernetes.io/component: lakeui
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "lake-of-tears.name" . }}
        app.kubernetes.io/component: lakeui
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: lakeui
          image: {{ .Values.lakeui.image.repository }}:{{ .Values.lakeui.image.tag }}
          imagePullPolicy: {{ .Values.lakeui.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: MINIO_ENDPOINT
              value: "{{ include "lake-of-tears.fullname" . }}-minio:{{ .Values.minio.service.apiPort }}"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_BUCKET
              value: datalake
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: GEMINI_API_KEY
            - name: MINIO_CONSOLE_URL
              value: {{ .Values.lakeui.minioConsoleUrl | default (printf "https://%s" .Values.ingress.minioConsoleHost) | quote }}
            - name: AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: authSecretKey
            - name: BACKEND_URL
              value: "http://{{ include "lake-of-tears.fullname" . }}-backend:8000"
            - name: AUTH_ENABLED
              value: {{ .Values.backend.enabled | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            {{- toYaml .Values.lakeui.resources | nindent 12 }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lake-of-tears.fullname" . }}-lakeui
  labels:
    {{- include "lake-of-tears.labels" . | nindent 4 }}
    app.kubernetes.io/component: lakeui
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: {{ include "lake-of-tears.name" . }}
    app.kubernetes.io/component: lakeui
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.lakeui.service.port }}
      targetPort: http
      protocol: TCP
