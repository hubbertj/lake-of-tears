---
# MinIO data — should be backed by NFS pointing at the TrueNAS ZFS dataset
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "lake-of-tears.fullname" . }}-minio-data
  labels:
    {{- include "lake-of-tears.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  accessModes:
    - {{ .Values.minio.persistence.accessMode }}
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.minio.persistence.size }}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "lake-of-tears.fullname" . }}-superset-home
  labels:
    {{- include "lake-of-tears.labels" . | nindent 4 }}
    app.kubernetes.io/component: superset
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.global.storageClass }}
  storageClassName: {{ .Values.global.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.superset.persistence.size }}

