---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lake-of-tears.fullname" . }}-airflow
  labels:
    {{- include "lake-of-tears.labels" . | nindent 4 }}
    app.kubernetes.io/component: airflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "lake-of-tears.name" . }}
      app.kubernetes.io/component: airflow
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "lake-of-tears.name" . }}
        app.kubernetes.io/component: airflow
    spec:
      securityContext:
        runAsUser: 0   # root required for pip installs at startup
      containers:
        - name: airflow
          image: {{ .Values.airflow.image.repository }}:{{ .Values.airflow.image.tag }}
          imagePullPolicy: {{ .Values.airflow.image.pullPolicy }}
          args: ["standalone"]
          env:
            - name: CONNECTION_CHECK_MAX_COUNT
              value: "0"
            - name: AIRFLOW__CORE__EXECUTOR
              value: SequentialExecutor
            - name: AIRFLOW__CORE__LOAD_EXAMPLES
              value: "False"
            - name: AIRFLOW__CORE__DAGS_FOLDER
              value: /opt/airflow/dags
            - name: AIRFLOW__WEBSERVER__SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: AIRFLOW_SECRET_KEY
            # BASE_URL tells Airflow to prefix all generated links with /airflow/.
            # The nginx Ingress strips this prefix before forwarding to the pod.
            - name: AIRFLOW__WEBSERVER__BASE_URL
              value: "https://{{ .Values.ingress.host }}/airflow/"
            - name: _AIRFLOW_WWW_USER_USERNAME
              value: admin
            - name: _AIRFLOW_WWW_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: AIRFLOW_ADMIN_PASSWORD
            - name: _PIP_ADDITIONAL_REQUIREMENTS
              value: {{ .Values.airflow.extraPipPackages | join " " | quote }}
            - name: MINIO_ENDPOINT
              value: "{{ include "lake-of-tears.fullname" . }}-minio:{{ .Values.minio.service.apiPort }}"
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: MINIO_ROOT_USER
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: MINIO_ROOT_PASSWORD
            - name: MINIO_BUCKET
              value: datalake
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: GEMINI_API_KEY
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: STRIPE_SECRET_KEY
            - name: SHOPIFY_STORE_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: SHOPIFY_STORE_DOMAIN
            - name: SHOPIFY_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: SHOPIFY_ACCESS_TOKEN
            - name: HUBSPOT_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: HUBSPOT_ACCESS_TOKEN
            - name: POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ include "lake-of-tears.fullname" . }}-credentials
                  key: POSTGRES_DSN
          ports:
            - name: http
              containerPort: {{ .Values.airflow.service.port }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 180
            periodSeconds: 30
            failureThreshold: 10
          volumeMounts:
            - name: airflow-home
              mountPath: /opt/airflow
          resources:
            {{- toYaml .Values.airflow.resources | nindent 12 }}
      volumes:
        - name: airflow-home
          persistentVolumeClaim:
            claimName: {{ include "lake-of-tears.fullname" . }}-airflow-home

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "lake-of-tears.fullname" . }}-airflow
  labels:
    {{- include "lake-of-tears.labels" . | nindent 4 }}
    app.kubernetes.io/component: airflow
spec:
  selector:
    app.kubernetes.io/name: {{ include "lake-of-tears.name" . }}
    app.kubernetes.io/component: airflow
  ports:
    - name: http
      port: {{ .Values.airflow.service.port }}
      targetPort: http
