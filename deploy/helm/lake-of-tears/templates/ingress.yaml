{{- if .Values.ingress.enabled }}

{{- $fullName := include "lake-of-tears.fullname" . }}
{{- $labels   := include "lake-of-tears.labels"   . }}

# ── Lake UI + embedded services (path-based, single host) ──────────────────
#
# /api/       → Auth backend
# /           → Lake UI shell
# /jupyter/   → JupyterLab  (base_url=/jupyter/ — no path rewrite needed)
# /superset/  → Superset    (APPLICATION_PREFIX_PATH=/superset — no rewrite)
# /airflow/   → Airflow     (BASE_URL has /airflow/ prefix; nginx strips it)

{{- if .Values.backend.enabled }}
---
# Auth backend — /api/ path (must be listed before /)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-backend
  labels:
    {{- $labels | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-backend
                port:
                  name: http
{{- end }}

---
# Lake UI (root path — must be listed last so more-specific paths take priority)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-lakeui
  labels:
    {{- $labels | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "512m"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-lakeui
                port:
                  name: http

---
# JupyterLab — served at /jupyter/ (no rewrite; Jupyter handles its own base_url)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-jupyter
  labels:
    {{- $labels | nindent 4 }}
  annotations:
    # Long timeout + WebSocket upgrade for notebook kernels
    nginx.ingress.kubernetes.io/proxy-read-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "86400"
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /jupyter/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-jupyter
                port:
                  name: http

---
# Apache Superset — nginx strips /superset prefix before forwarding.
# wsgi.py injects SCRIPT_NAME=/superset so Flask generates correct prefixed URLs.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-superset
  labels:
    {{- $labels | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /superset(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ $fullName }}-superset
                port:
                  name: http

---
# Apache Airflow — pass /airflow/ through unchanged; Airflow serves its own
# routes under /airflow because BASE_URL includes that path prefix.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-airflow
  labels:
    {{- $labels | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /airflow
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-airflow
                port:
                  name: http

---
# MinIO Console — own subdomain (SPA cannot be reliably path-proxied)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-minio-console
  labels:
    {{- $labels | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.minioConsoleHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-minio
                port:
                  name: console

---
# MinIO S3 API — own subdomain for external S3 clients
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}-minio-api
  labels:
    {{- $labels | nindent 4 }}
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "600"
    {{- with .Values.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.minioApiHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-minio
                port:
                  name: api

{{- end }}
